name: Netlify PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 플러그인 설치 추가
      - name: Install Netlify plugins
        run: |
          npm install -D @netlify/plugin-lighthouse
          npm install -D @netlify/plugin-nextjs
          npm install -D netlify-plugin-inline-source-map

      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
          echo "NEXT_TOKEN_MAX_AGE=${{ secrets.NEXT_TOKEN_MAX_AGE }}" >> .env

      - name: Create netlify.toml for plugins
        run: |
          cat > netlify.toml << 'EOL'
          [build]
            command = "npm run build"
            publish = ".next"

          # 라이트하우스 성능 분석 플러그인
          [[plugins]]
            package = "@netlify/plugin-lighthouse"
            
            [plugins.inputs]
              output_path = "reports/lighthouse.html"
              audit_mobile = true
              audit_desktop = true

          # 번들 분석 플러그인 
          [[plugins]]
            package = "netlify-plugin-inline-source-map"
            
          # Next.js 최적화
          [[plugins]]
            package = "@netlify/plugin-nextjs"
          EOL

      - name: Build project
        run: npm run build

      # netlify-cli를 사용하여 배포
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      # PR에 대한 미리보기 배포
      - name: Deploy Preview to Netlify
        run: netlify deploy --build --alias=pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
