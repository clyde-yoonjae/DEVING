name: Netlify PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
          echo "NEXT_TOKEN_MAX_AGE=${{ secrets.NEXT_TOKEN_MAX_AGE }}" >> .env

      - name: Build project
        run: npm run build

      # netlify-cli를 사용하여 배포
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      # PR에 대한 미리보기 배포
      - name: Deploy Preview to Netlify
        run: netlify deploy --build --message "PR #${{ github.event.number }} - ${{ github.event.pull_request.title }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # 미리보기 URL 가져오기
      - name: Get Netlify Preview URL
        id: netlify-url
        run: |
          PREVIEW_URL=$(netlify deploy --json | jq -r '.deploy_url')
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # PR 코멘트 추가
      - name: Add Netlify Preview URL to PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { issue: { number: issue_number }, repo: { owner, repo } } = context;
            const deployUrl = '${{ steps.netlify-url.outputs.preview_url }}';

            github.rest.issues.createComment({
              issue_number,
              owner,
              repo,
              body: `## 🚀 Netlify 미리보기가 배포되었습니다!\n\n### 🔍 [미리보기 링크](${deployUrl})\n\n배포 시간: ${new Date().toLocaleString()}`
            });
